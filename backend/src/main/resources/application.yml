spring:
  application:
    name: pennycheck-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:anjali21i}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  jackson:
    time-zone: UTC

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    issuer: ${JWT_ISSUER:pennycheck-local}
    secret: ${JWT_SECRET:replace-with-a-strong-development-secret}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
  auth:
    expose-development-tokens: ${AUTH_EXPOSE_DEVELOPMENT_TOKENS:true}
    rate-limit-window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:300}
    max-auth-attempts: ${AUTH_MAX_AUTH_ATTEMPTS:10}
  security:
    allowed-origins: ${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:19006,http://localhost:8081}
    hsts-enabled: ${APP_SECURITY_HSTS_ENABLED:false}
